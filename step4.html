<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEP 4. 모듈 상세 설정 — makeyourplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Pretendard',sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;flex-direction:column}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;height:52px;border-bottom:1px solid #E5E7EB;padding:0 24px;gap:16px;flex-shrink:0}
    .topbar-logo{font-size:15px;font-weight:800;color:#111;text-decoration:none}
    .topbar-sep{color:#E5E7EB;font-size:18px}
    .topbar-title{font-size:14px;font-weight:600;color:#555}
    .topbar-spacer{flex:1}
    .topbar-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
    .topbar-btn-outline{background:#fff;color:#111;border:1px solid #E5E7EB}
    .topbar-btn-primary{background:#3B82F6;color:#fff;border:none}
    .topbar-btn-primary:hover{background:#2563EB}

    /* STEP BAR */
    .step-progress{background:#FAFAFA;border-bottom:1px solid #E5E7EB;padding:0 24px}
    .step-list{display:flex;max-width:640px;margin:0 auto}
    .step-item{flex:1;padding:14px 0;display:flex;align-items:center;gap:8px;font-size:13px;color:#CCC;font-weight:600;border-bottom:3px solid transparent}
    .step-item.done{color:#3B82F6}
    .step-item.done .step-num{background:#3B82F6}
    .step-item.active{color:#3B82F6;border-bottom-color:#3B82F6}
    .step-item.active .step-num{background:#3B82F6}
    .step-num{width:22px;height:22px;border-radius:50%;background:#DDD;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
    .step-connector{flex:1;height:1px;background:#E5E7EB;margin:0 8px}

    /* CONTENT */
    .content-area{flex:1;display:flex;overflow:hidden}

    /* LEFT — CANVAS */
    .left-pane{flex:1;padding:40px;overflow-y:auto;background:#F9FAFB;border-right:1px solid #E5E7EB}
    .left-pane h2{font-size:22px;font-weight:800;margin-bottom:6px}
    .left-pane .subtitle{font-size:14px;color:#888;margin-bottom:28px}
    .canvas-tools{display:flex;gap:8px;margin-bottom:20px}
    .canvas-tool{width:32px;height:32px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
    .canvas-tool:hover{border-color:#3B82F6}

    /* FRAME CANVAS VIEW */
    .frame-canvas-wrap{background:#fff;border:2px solid #1A1A1A;border-radius:4px;width:360px;height:360px;position:relative;overflow:hidden;display:grid}
    .module-cell{display:flex;align-items:center;justify-content:center;border:1px dashed #E5E7EB;cursor:pointer;font-size:13px;font-weight:600;transition:all 0.15s;position:relative}
    .module-cell:hover{border-color:#3B82F6}
    .module-cell.selected{border:2px solid #3B82F6 !important;background:rgba(59,130,246,0.05) !important}
    .module-cell.shelf-cell{background:rgba(59,130,246,0.08);color:#3B82F6;border-color:#BFDBFE}
    .module-cell.hanger-cell{background:rgba(168,85,247,0.08);color:#A855F7;border-color:#E9D5FF}
    .module-cell.display-cell{background:rgba(34,197,94,0.08);color:#16A34A;border-color:#BBF7D0}
    .module-cell.counter-cell{background:rgba(245,158,11,0.08);color:#D97706;border-color:#FDE68A}
    .module-cell.empty-cell{background:#FAFAFA;color:#CCC}
    .cell-label{font-size:12px;font-weight:600;text-align:center;padding:4px}

    /* RIGHT — LIBRARY */
    .right-pane{width:320px;flex-shrink:0;overflow-y:auto;border-left:1px solid #E5E7EB;display:flex;flex-direction:column}
    .library-header{padding:16px 20px;border-bottom:1px solid #F0F0F0;font-size:15px;font-weight:700;color:#111;flex-shrink:0}
    .library-tabs{display:flex;border-bottom:1px solid #E5E7EB;flex-shrink:0}
    .lib-tab{flex:1;padding:11px;font-size:13px;font-weight:600;color:#AAA;text-align:center;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s}
    .lib-tab:hover{color:#3B82F6}
    .lib-tab.active{color:#3B82F6;border-bottom-color:#3B82F6}
    .library-list{flex:1;overflow-y:auto;padding:12px}
    .library-list::-webkit-scrollbar{width:4px}
    .library-list::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:2px}

    /* MODULE CARD */
    .mod-card{display:flex;align-items:center;gap:12px;padding:14px;border:1px solid #F0F0F0;border-radius:12px;margin-bottom:10px;cursor:pointer;transition:all 0.15s}
    .mod-card:hover{border-color:#3B82F6;box-shadow:0 2px 12px rgba(59,130,246,0.1)}
    .mod-card.selected{border-color:#3B82F6;border-width:2px;background:#EFF6FF}
    .mod-img{width:64px;height:64px;border-radius:8px;object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;background:#F5F5F5}
    .mod-info{flex:1;min-width:0}
    .mod-name{font-size:13px;font-weight:700;margin-bottom:2px}
    .mod-spec{font-size:11px;color:#AAA;line-height:1.5}
    .mod-price{font-size:13px;font-weight:700;color:#3B82F6;flex-shrink:0}

    /* TOTAL */
    .total-bar{padding:16px 20px;border-top:1px solid #E5E7EB;flex-shrink:0;background:#FAFAFA}
    .total-row{display:flex;justify-content:space-between;align-items:center}
    .total-label{font-size:14px;color:#555}
    .total-price{font-size:20px;font-weight:800;color:#111}
    .next-btn{width:100%;background:#3B82F6;color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:12px}
    .next-btn:hover{background:#2563EB}

    /* FOOTER */
    footer{padding:16px 24px;border-top:1px solid #F0F0F0;font-size:12px;color:#CCC;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
    footer a{color:#CCC;text-decoration:none}

    /* GEAR */
    .gear-btn{position:fixed;bottom:24px;right:24px;width:40px;height:40px;background:#fff;border:1px solid #E5E7EB;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:200;transition:transform 0.2s}
    .gear-btn:hover{transform:rotate(45deg)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:32px;width:400px;max-width:90vw}
    .modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
    .modal p{font-size:13px;color:#666;margin-bottom:20px}
    .modal input{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;margin-bottom:16px}
    .modal input:focus{border-color:#3B82F6}
    .modal-btns{display:flex;gap:8px}
    .modal-save{flex:1;background:#3B82F6;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .modal-cancel{flex:1;background:#F5F5F5;color:#444;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

    @media(max-width:900px){
      .right-pane{width:260px}
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="topbar-logo">makeyourplace</a>
  <span class="topbar-sep">|</span>
  <span class="topbar-title">나만의 공간 맞춤 가구</span>
  <div class="topbar-spacer"></div>
  <button class="topbar-btn topbar-btn-outline" onclick="window.location.href='step3.html'">임시 저장</button>
  <button class="topbar-btn topbar-btn-primary" onclick="saveAndNext()">최종 완료</button>
</div>

<div class="step-progress">
  <div class="step-list">
    <div class="step-item done"><div class="step-num">1</div> 프레임 선택</div>
    <div class="step-connector"></div>
    <div class="step-item done"><div class="step-num">2</div> 사이즈 편집</div>
    <div class="step-connector"></div>
    <div class="step-item done"><div class="step-num">3</div> 구역 설정</div>
    <div class="step-connector"></div>
    <div class="step-item active"><div class="step-num">4</div> 모듈 상세 설정</div>
  </div>
</div>

<div class="content-area">
  <!-- LEFT: FRAME CANVAS -->
  <div class="left-pane">
    <h2>모듈 상세 설정</h2>
    <p class="subtitle">선택한 프레임 내부의 수납 모듈을 자유롭게 배치하세요.</p>
    <div class="canvas-tools">
      <div class="canvas-tool" title="새로고침" onclick="renderFrameCanvas()">↺</div>
      <div class="canvas-tool" title="확대">⊕</div>
    </div>
    <div class="frame-canvas-wrap" id="frameCanvas"></div>
  </div>

  <!-- RIGHT: LIBRARY -->
  <div class="right-pane">
    <div class="library-header">모듈 라이브러리</div>
    <div class="library-tabs">
      <div class="lib-tab active" onclick="switchTab('all', this)">전체</div>
      <div class="lib-tab" onclick="switchTab('shelf_hanger', this)">선반/행거</div>
      <div class="lib-tab" onclick="switchTab('drawer_box', this)">서랍/박스</div>
    </div>
    <div class="library-list" id="libraryList"></div>
    <div class="total-bar">
      <div class="total-row">
        <span class="total-label">총 합계</span>
        <span class="total-price" id="totalPrice">0원</span>
      </div>
      <button class="next-btn" onclick="saveAndNext()">다음 단계로 (결제 정보)</button>
    </div>
  </div>
</div>

<footer>
  <div>
    <a href="#">도움말</a> &nbsp; <a href="#">실시간 상담</a> &nbsp; <a href="#">카드로 결제</a>
  </div>
  <span>© 2023 makeyourplace Inc. All rights reserved.</span>
</footer>

<button class="gear-btn" onclick="openModal()">⚙</button>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3>API 키 설정</h3>
    <p>Claude API 키를 입력하면 AI 기능이 활성화됩니다.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="document.getElementById('modalOverlay').classList.remove('open')">취소</button>
      <button class="modal-save" onclick="saveApiKey()">저장</button>
    </div>
  </div>
</div>

<script>
const MODULES_DB = {
  all: [
    { id:'shelf-wood', name:'심플 우드 선반', spec:'강화 원목 | 20kg 하중', price:15000, emoji:'🌿', type:'shelf', category:'shelf_hanger' },
    { id:'shelf-soft', name:'소프트 클로징 2단 서랍', spec:'MDF | 고정 슬라이드', price:48000, emoji:'📦', type:'display', category:'drawer_box' },
    { id:'hanger-ss', name:'스테인리스 행거 봉', spec:'강화 조각 가공 | 5mm', price:12000, emoji:'🪝', type:'hanger', category:'shelf_hanger' },
    { id:'box-multi', name:'다용도 오픈 박스', spec:'패브릭 덧댐 | 3개입', price:9000, emoji:'🗃', type:'display', category:'drawer_box' },
    { id:'counter-white', name:'미니 카운터 테이블', spec:'백색 MDF | 조립식', price:35000, emoji:'🗄', type:'counter', category:'all' },
    { id:'shelf-glass', name:'강화 유리 선반', spec:'5mm 강화유리 | 15kg', price:22000, emoji:'🔲', type:'shelf', category:'shelf_hanger' },
    { id:'hanger-wall', name:'벽걸이 행거 바', spec:'알루미늄 | 맞춤 조절', price:18000, emoji:'📎', type:'hanger', category:'shelf_hanger' },
    { id:'box-display', name:'디스플레이 케이스', spec:'아크릴 | 잠금장치', price:55000, emoji:'💎', type:'display', category:'drawer_box' },
  ]
};

let selectedModules = [];
let activeTab = 'all';
let selectedCellIdx = null;
let cellModules = []; // per-cell module assignment

function getFrameLayout() {
  const layout = JSON.parse(localStorage.getItem('layoutData') || '[]');
  if (layout.length) return layout[0].modules || [];
  return [
    {type:'shelf',label:'상단 선반'},
    {type:'empty',label:'모듈 배치 가능'},
    {type:'empty',label:'모듈 배치 가능'},
    {type:'display',label:'2단 서랍장'},
  ];
}

function renderFrameCanvas() {
  const modules = getFrameLayout();
  const canvas = document.getElementById('frameCanvas');
  const cols = 2;
  const rows = Math.ceil(modules.length / cols);
  canvas.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  canvas.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
  canvas.innerHTML = '';

  if (cellModules.length === 0) {
    cellModules = modules.map(() => null);
  }

  modules.forEach((m, i) => {
    const cell = document.createElement('div');
    const assigned = cellModules[i];
    const typeClass = assigned ? (assigned.type + '-cell') : (m.type !== 'empty' ? m.type + '-cell' : 'empty-cell');
    cell.className = 'module-cell ' + typeClass + (selectedCellIdx === i ? ' selected' : '');
    const label = assigned ? assigned.name : (m.label || '모듈 배치 가능');
    cell.innerHTML = `<div class="cell-label">${label}</div>`;
    cell.onclick = () => {
      selectedCellIdx = i;
      renderFrameCanvas();
    };
    canvas.appendChild(cell);
  });
}

function switchTab(tab, el) {
  activeTab = tab;
  document.querySelectorAll('.lib-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderLibrary();
}

function renderLibrary() {
  const list = document.getElementById('libraryList');
  list.innerHTML = '';
  const mods = activeTab === 'all'
    ? MODULES_DB.all
    : MODULES_DB.all.filter(m => m.category === activeTab || m.category === 'all');

  mods.forEach(m => {
    const isSelected = selectedModules.some(s => s.id === m.id);
    const card = document.createElement('div');
    card.className = 'mod-card' + (isSelected ? ' selected' : '');
    card.innerHTML = `
      <div class="mod-img">${m.emoji}</div>
      <div class="mod-info">
        <div class="mod-name">${m.name}</div>
        <div class="mod-spec">${m.spec}</div>
      </div>
      <div class="mod-price">+ ${m.price.toLocaleString()}원</div>`;
    card.onclick = () => toggleModule(m, card);
    list.appendChild(card);
  });

  updateTotal();
}

function toggleModule(m, card) {
  const idx = selectedModules.findIndex(s => s.id === m.id);
  if (idx >= 0) {
    selectedModules.splice(idx, 1);
    card.classList.remove('selected');
  } else {
    selectedModules.push(m);
    card.classList.add('selected');
    // Assign to selected cell
    if (selectedCellIdx !== null) {
      cellModules[selectedCellIdx] = m;
      renderFrameCanvas();
      selectedCellIdx = null;
    }
  }
  updateTotal();
  saveModules();
}

function updateTotal() {
  const total = selectedModules.reduce((s, m) => s + m.price, 0);
  document.getElementById('totalPrice').textContent = total.toLocaleString() + '원';
}

function saveModules() {
  localStorage.setItem('moduleData', JSON.stringify({
    selectedModules,
    cellModules,
  }));
}

function saveAndNext() {
  saveModules();
  window.location.href = 'step5.html';
}

window.addEventListener('load', () => {
  const saved = JSON.parse(localStorage.getItem('moduleData') || 'null');
  if (saved) {
    selectedModules = saved.selectedModules || [];
    cellModules = saved.cellModules || [];
  }
  renderFrameCanvas();
  renderLibrary();
});

function openModal(){
  document.getElementById('apiKeyInput').value = localStorage.getItem('apiKey')||'';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){
  if(e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
function saveApiKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(k) localStorage.setItem('apiKey',k);
  document.getElementById('modalOverlay').classList.remove('open');
}
</script>
</body>
</html>
