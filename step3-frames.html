<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEP 3. 레이아웃 편집 — makeyourplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'Pretendard',sans-serif;background:#fff;color:#111;overflow:hidden}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;height:52px;border-bottom:1px solid #E5E7EB;background:#fff;padding:0 20px;gap:12px;flex-shrink:0;z-index:10;position:relative}
    .topbar-logo{font-size:15px;font-weight:800;color:#111;text-decoration:none}
    .topbar-sep{color:#E5E7EB;font-size:18px}
    .topbar-title{font-size:13px;font-weight:600;color:#555}
    .topbar-spacer{flex:1}
    .topbar-btn{padding:8px 16px;border-radius:9999px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all 0.15s;border:none}
    .btn-add{background:#F0F7FF;color:#3B82F6;border:1px dashed #93C5FD}
    .btn-add:hover{background:#DBEAFE}
    .btn-quote{background:#020202;color:#fff}
    .btn-quote:hover{background:#1a1a1a}
    .btn-back{background:#fff;color:#555;border:1px solid #E5E7EB}
    .btn-back:hover{border-color:#3B82F6;color:#3B82F6}

    /* WORKSPACE */
    .workspace{display:flex;height:calc(100vh - 52px)}

    /* CANVAS (70%) */
    .canvas-area{flex:7;background:#F4F5F7;position:relative;overflow:hidden;background-image:radial-gradient(circle,#D1D5DB 1px,transparent 1px);background-size:28px 28px}
    .canvas-frame{position:absolute;border-radius:8px;cursor:grab;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:2px solid rgba(0,0,0,0.08);user-select:none;transition:border-color 0.15s,box-shadow 0.15s;min-width:60px;min-height:50px}
    .canvas-frame:active{cursor:grabbing}
    .canvas-frame.selected{border-color:#3B82F6!important;box-shadow:0 0 0 3px rgba(59,130,246,0.25)}
    .canvas-frame-icon{font-size:22px;pointer-events:none;line-height:1}
    .canvas-frame-label{font-size:10px;font-weight:700;color:rgba(0,0,0,0.6);pointer-events:none;text-align:center;padding:0 6px;line-height:1.3;word-break:break-all}
    .canvas-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:#CCC;pointer-events:none}
    .canvas-empty-icon{font-size:48px}
    .canvas-empty-text{font-size:14px;font-weight:600}

    /* RIGHT PANEL (30%) */
    .right-panel{flex:3;border-left:1px solid #E5E7EB;display:flex;flex-direction:column;overflow:hidden;background:#fff;min-width:240px;max-width:320px}
    .panel-header{padding:14px 16px;font-size:13px;font-weight:700;color:#111;border-bottom:1px solid #F0F0F0;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
    .panel-close-btn{width:24px;height:24px;border-radius:50%;background:#F5F5F5;border:none;cursor:pointer;font-size:12px;color:#666;display:flex;align-items:center;justify-content:center}
    .panel-close-btn:hover{background:#FEE2E2;color:#EF4444}
    .panel-body{flex:1;overflow-y:auto;padding:14px 16px}
    .panel-body::-webkit-scrollbar{width:4px}
    .panel-body::-webkit-scrollbar-thumb{background:#E5E7EB;border-radius:2px}

    /* OVERVIEW */
    .concept-card{background:#F5F3FF;border:1px solid #DDD6FE;border-radius:10px;padding:12px 14px;margin-bottom:16px}
    .concept-card-label{font-size:10px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
    .concept-card-text{font-size:12px;color:#5B21B6;line-height:1.65}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .info-cell{background:#F9FAFB;border:1px solid #F0F0F0;border-radius:8px;padding:10px 12px;text-align:center}
    .info-cell-val{font-size:20px;font-weight:800;color:#111}
    .info-cell-label{font-size:11px;color:#AAA;margin-top:2px}
    .hint-text{font-size:12px;color:#AAA;line-height:1.6;text-align:center;padding:8px 0}

    /* FRAME EDIT */
    .prop-group{margin-bottom:14px}
    .prop-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px}
    .prop-input{width:100%;border:1px solid #E5E7EB;border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit;outline:none;color:#111}
    .prop-input:focus{border-color:#3B82F6}
    .module-list{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
    .module-row{background:#F9FAFB;border:1px solid #F0F0F0;border-radius:8px;padding:8px 10px}
    .module-row-top{display:flex;align-items:center;gap:6px;margin-bottom:6px}
    .mod-name-input{flex:1;border:1px solid #E5E7EB;border-radius:5px;padding:4px 7px;font-size:12px;font-family:inherit;outline:none;color:#111;min-width:0}
    .mod-name-input:focus{border-color:#3B82F6}
    .mod-del-btn{width:20px;height:20px;border-radius:50%;background:#FEE2E2;color:#EF4444;border:none;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
    .mod-del-btn:hover{background:#FCA5A5}
    .module-row-bottom{display:flex;align-items:center;gap:6px}
    .mod-qty-wrap{display:flex;align-items:center;gap:4px;border:1px solid #E5E7EB;border-radius:6px;padding:3px 6px;background:#fff}
    .mod-qty-btn{width:18px;height:18px;border:none;background:none;cursor:pointer;font-size:14px;color:#555;display:flex;align-items:center;justify-content:center;border-radius:3px;flex-shrink:0}
    .mod-qty-btn:hover{background:#F0F0F0}
    .mod-qty-val{font-size:12px;font-weight:700;min-width:18px;text-align:center}
    .mod-price-wrap{display:flex;align-items:center;gap:4px;flex:1}
    .mod-price-label{font-size:10px;color:#AAA;flex-shrink:0}
    .mod-price-input{flex:1;border:1px solid #E5E7EB;border-radius:5px;padding:4px 6px;font-size:11px;font-family:inherit;outline:none;color:#111;min-width:0}
    .mod-price-input:focus{border-color:#3B82F6}
    .add-mod-btn{width:100%;background:#F0FDF4;color:#16A34A;border:1px dashed #86EFAC;border-radius:9999px;padding:8px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s;margin-bottom:14px}
    .add-mod-btn:hover{background:#DCFCE7}
    .del-frame-btn{width:100%;background:#FFF1F2;color:#EF4444;border:1px solid #FECDD3;border-radius:9999px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.15s}
    .del-frame-btn:hover{background:#FEE2E2}

    /* GEAR / MODAL */
    .gear-btn{position:fixed;bottom:24px;right:24px;width:38px;height:38px;background:#fff;border:1px solid #E5E7EB;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:200;transition:transform 0.2s}
    .gear-btn:hover{transform:rotate(45deg)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:32px;width:400px;max-width:90vw}
    .modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
    .modal p{font-size:13px;color:#666;margin-bottom:20px}
    .modal input{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;margin-bottom:16px}
    .modal input:focus{border-color:#3B82F6}
    .modal-btns{display:flex;gap:8px}
    .modal-save{flex:1;background:#020202;color:#fff;border:none;padding:12px;border-radius:9999px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .modal-cancel{flex:1;background:#F5F5F5;color:#444;border:none;padding:12px;border-radius:9999px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

    @media(max-width:768px){
      .canvas-area{flex:none;width:100%;height:55vh}
      .workspace{flex-direction:column}
      .right-panel{flex:none;max-width:none;border-left:none;border-top:1px solid #E5E7EB;height:45vh}
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <a href="index.html" class="topbar-logo">makeyourplace</a>
  <span class="topbar-sep">|</span>
  <span class="topbar-title">STEP 3. 레이아웃 편집</span>
  <div class="topbar-spacer"></div>
  <button class="topbar-btn btn-back" onclick="window.location.href='step2-loading.html'">← 다시 생성</button>
  <button class="topbar-btn btn-add" onclick="addFrame()">+ 프레임 추가</button>
  <button class="topbar-btn btn-quote" onclick="goToQuote()">견적 확인하기 →</button>
</div>

<div class="workspace">
  <!-- CANVAS -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-empty" id="canvasEmpty">
      <div class="canvas-empty-icon">🏗</div>
      <div class="canvas-empty-text">레이아웃을 불러오는 중...</div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="panel-header">
      <span id="panelTitle">레이아웃 정보</span>
      <button class="panel-close-btn" id="panelCloseBtn" onclick="deselectFrame()" style="display:none">✕</button>
    </div>
    <div class="panel-body" id="panelBody"></div>
  </div>
</div>

<button class="gear-btn" onclick="openModal()">⚙</button>
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOverlay(event)">
  <div class="modal">
    <h3>API 키 설정</h3>
    <p>Claude API 키를 입력하면 AI 레이아웃 생성이 활성화됩니다.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="document.getElementById('modalOverlay').classList.remove('open')">취소</button>
      <button class="modal-save" onclick="saveApiKey()">저장</button>
    </div>
  </div>
</div>

<script>
// ── State ──
let frames = [];
let layoutMeta = {};
let selectedIdx = -1;

const TYPE_ICONS = { rack:'🗄', shelf:'📦', counter:'🛒', display:'🖼', hanger:'👔' };
const DEFAULT_COLORS = ['#DBEAFE','#EDE9FE','#DCFCE7','#FEF3C7','#FFE4E6','#F0FDF4'];

// ── Init ──
window.addEventListener('load', () => {
  const saved = JSON.parse(localStorage.getItem('layoutData') || 'null');
  if (saved && saved.frames && saved.frames.length) {
    layoutMeta = { layout: saved.layout, designConcept: saved.designConcept };
    frames = saved.frames;
  } else {
    layoutMeta = { designConcept: '' };
    frames = getDefaultFrames();
  }
  document.getElementById('canvasEmpty').style.display = 'none';
  renderCanvas();
  renderPanel();
});

function getDefaultFrames() {
  return [
    { id: 'f1', type: 'rack', label: '메인 진열대', x: 5, y: 5, width: 22, height: 28, color: '#DBEAFE',
      modules: [{ name: '선반', quantity: 3, unitPrice: 15000 }] },
    { id: 'f2', type: 'counter', label: '카운터', x: 70, y: 5, width: 22, height: 18, color: '#FEF3C7',
      modules: [{ name: '카운터 유닛', quantity: 1, unitPrice: 50000 }] },
    { id: 'f3', type: 'display', label: '디스플레이 존', x: 5, y: 60, width: 35, height: 28, color: '#DCFCE7',
      modules: [{ name: '진열 선반', quantity: 4, unitPrice: 12000 }] },
  ];
}

// ── Canvas Rendering ──
function renderCanvas() {
  const area = document.getElementById('canvasArea');
  area.querySelectorAll('.canvas-frame').forEach(el => el.remove());

  frames.forEach((f, i) => {
    const el = document.createElement('div');
    el.className = 'canvas-frame' + (i === selectedIdx ? ' selected' : '');
    el.style.left = f.x + '%';
    el.style.top = f.y + '%';
    el.style.width = f.width + '%';
    el.style.height = f.height + '%';
    el.style.background = f.color || DEFAULT_COLORS[i % DEFAULT_COLORS.length];
    el.innerHTML = `
      <div class="canvas-frame-icon">${TYPE_ICONS[f.type] || '📦'}</div>
      <div class="canvas-frame-label">${f.label || f.id}</div>
    `;

    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      if (selectedIdx !== i) {
        document.querySelectorAll('.canvas-frame').forEach(fr => fr.classList.remove('selected'));
        el.classList.add('selected');
        selectedIdx = i;
        renderPanel();
      }
      startDrag(e, el, f);
    });
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (selectedIdx !== i) {
        document.querySelectorAll('.canvas-frame').forEach(fr => fr.classList.remove('selected'));
        el.classList.add('selected');
        selectedIdx = i;
        renderPanel();
      }
      startDragTouch(e, el, f);
    }, { passive: false });

    area.appendChild(el);
  });
}

// ── Drag ──
function startDrag(e, el, frame) {
  const area = document.getElementById('canvasArea');
  const rect = area.getBoundingClientRect();
  const startXPct = ((e.clientX - rect.left) / rect.width) * 100;
  const startYPct = ((e.clientY - rect.top) / rect.height) * 100;
  const origX = frame.x;
  const origY = frame.y;

  el.style.opacity = '0.85';
  el.style.boxShadow = '0 8px 24px rgba(0,0,0,0.18)';
  el.style.zIndex = '10';
  el.style.transition = 'none';

  function onMove(ev) {
    const xPct = ((ev.clientX - rect.left) / rect.width) * 100;
    const yPct = ((ev.clientY - rect.top) / rect.height) * 100;
    frame.x = Math.max(0, Math.min(100 - frame.width, origX + (xPct - startXPct)));
    frame.y = Math.max(0, Math.min(100 - frame.height, origY + (yPct - startYPct)));
    el.style.left = frame.x + '%';
    el.style.top = frame.y + '%';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    el.style.opacity = '';
    el.style.boxShadow = '';
    el.style.zIndex = '';
    el.style.transition = '';
    autoSave();
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function startDragTouch(e, el, frame) {
  const area = document.getElementById('canvasArea');
  const rect = area.getBoundingClientRect();
  const t0 = e.touches[0];
  const startXPct = ((t0.clientX - rect.left) / rect.width) * 100;
  const startYPct = ((t0.clientY - rect.top) / rect.height) * 100;
  const origX = frame.x;
  const origY = frame.y;

  el.style.opacity = '0.85';
  el.style.boxShadow = '0 8px 24px rgba(0,0,0,0.18)';
  el.style.zIndex = '10';
  el.style.transition = 'none';

  function onMove(ev) {
    ev.preventDefault();
    const t = ev.touches[0];
    const xPct = ((t.clientX - rect.left) / rect.width) * 100;
    const yPct = ((t.clientY - rect.top) / rect.height) * 100;
    frame.x = Math.max(0, Math.min(100 - frame.width, origX + (xPct - startXPct)));
    frame.y = Math.max(0, Math.min(100 - frame.height, origY + (yPct - startYPct)));
    el.style.left = frame.x + '%';
    el.style.top = frame.y + '%';
  }
  function onEnd() {
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onEnd);
    el.style.opacity = '';
    el.style.boxShadow = '';
    el.style.zIndex = '';
    el.style.transition = '';
    autoSave();
  }
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend', onEnd);
}

// ── Right Panel ──
function renderPanel() {
  const body = document.getElementById('panelBody');
  const title = document.getElementById('panelTitle');
  const closeBtn = document.getElementById('panelCloseBtn');

  if (selectedIdx < 0 || !frames[selectedIdx]) {
    // Overview
    title.textContent = '레이아웃 정보';
    closeBtn.style.display = 'none';
    const concept = layoutMeta.designConcept || '';
    const totalModules = frames.reduce((s, f) => s + (f.modules || []).length, 0);
    body.innerHTML = `
      ${concept ? `<div class="concept-card"><div class="concept-card-label">AI 디자인 컨셉</div><div class="concept-card-text">${concept}</div></div>` : ''}
      <div class="info-grid">
        <div class="info-cell"><div class="info-cell-val">${frames.length}</div><div class="info-cell-label">총 프레임 수</div></div>
        <div class="info-cell"><div class="info-cell-val">${totalModules}</div><div class="info-cell-label">총 모듈 수</div></div>
      </div>
      <div class="hint-text">프레임을 클릭하면<br>세부 편집이 가능합니다.</div>
    `;
  } else {
    // Frame detail
    const f = frames[selectedIdx];
    title.textContent = f.label || '프레임 편집';
    closeBtn.style.display = 'flex';

    const moduleRows = (f.modules || []).map((m, mi) => `
      <div class="module-row">
        <div class="module-row-top">
          <input class="mod-name-input" type="text" value="${escHtml(m.name)}" onchange="updateModule(${mi},'name',this.value)" placeholder="모듈명">
          <button class="mod-del-btn" onclick="deleteModule(${mi})">✕</button>
        </div>
        <div class="module-row-bottom">
          <div class="mod-qty-wrap">
            <button class="mod-qty-btn" onclick="changeQty(${mi},-1)">−</button>
            <span class="mod-qty-val">${m.quantity || 1}</span>
            <button class="mod-qty-btn" onclick="changeQty(${mi},1)">+</button>
          </div>
          <div class="mod-price-wrap">
            <span class="mod-price-label">단가</span>
            <input class="mod-price-input" type="number" value="${m.unitPrice || 0}" onchange="updateModule(${mi},'unitPrice',+this.value)" placeholder="원">
          </div>
        </div>
      </div>
    `).join('');

    body.innerHTML = `
      <div class="prop-group">
        <div class="prop-label">프레임 이름</div>
        <input class="prop-input" type="text" value="${escHtml(f.label)}" oninput="updateFrameLabel(this.value)">
      </div>
      <div class="prop-group">
        <div class="prop-label">모듈 목록</div>
        <div class="module-list">${moduleRows}</div>
        <button class="add-mod-btn" onclick="addModule()">+ 모듈 추가</button>
      </div>
      <button class="del-frame-btn" onclick="deleteFrame()">이 프레임 삭제</button>
    `;
  }
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function deselectFrame() {
  selectedIdx = -1;
  renderCanvas();
  renderPanel();
}

// ── Frame / Module Editing ──
function updateFrameLabel(val) {
  if (frames[selectedIdx]) {
    frames[selectedIdx].label = val;
    renderCanvas();
    autoSave();
  }
}

function updateModule(mi, key, val) {
  if (!frames[selectedIdx]) return;
  frames[selectedIdx].modules[mi][key] = val;
  autoSave();
}

function changeQty(mi, delta) {
  if (!frames[selectedIdx]) return;
  const mod = frames[selectedIdx].modules[mi];
  mod.quantity = Math.max(1, (mod.quantity || 1) + delta);
  renderPanel();
  autoSave();
}

function deleteModule(mi) {
  if (!frames[selectedIdx]) return;
  frames[selectedIdx].modules.splice(mi, 1);
  renderPanel();
  autoSave();
}

function addModule() {
  if (!frames[selectedIdx]) return;
  frames[selectedIdx].modules.push({ name: '새 모듈', quantity: 1, unitPrice: 10000 });
  renderPanel();
  autoSave();
}

function addFrame() {
  const i = frames.length;
  frames.push({
    id: 'f' + Date.now(),
    type: 'rack',
    label: '새 프레임',
    x: 10 + (i % 4) * 20,
    y: 10 + Math.floor(i / 4) * 30,
    width: 18,
    height: 22,
    color: DEFAULT_COLORS[i % DEFAULT_COLORS.length],
    modules: [{ name: '선반', quantity: 1, unitPrice: 15000 }],
  });
  selectedIdx = frames.length - 1;
  renderCanvas();
  renderPanel();
  autoSave();
}

function deleteFrame() {
  if (selectedIdx < 0 || !frames[selectedIdx]) return;
  frames.splice(selectedIdx, 1);
  selectedIdx = -1;
  renderCanvas();
  renderPanel();
  autoSave();
}

// ── Save & Navigate ──
function autoSave() {
  localStorage.setItem('layoutData', JSON.stringify({ ...layoutMeta, frames }));
}

function goToQuote() {
  localStorage.setItem('finalLayout', JSON.stringify(frames));
  window.location.href = 'step5.html';
}

// ── Modal ──
function openModal() {
  document.getElementById('apiKeyInput').value = localStorage.getItem('myp_solution_api_key') || localStorage.getItem('apiKey') || '';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModalOverlay(e) {
  if (e.target === document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
function saveApiKey() {
  const k = document.getElementById('apiKeyInput').value.trim();
  if (k) { localStorage.setItem('myp_solution_api_key', k); localStorage.setItem('apiKey', k); }
  document.getElementById('modalOverlay').classList.remove('open');
}
</script>
</body>
</html>
