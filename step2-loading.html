<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 분석 중 — makeyourplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Pretendard',sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;flex-direction:column}

    /* NAV */
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px}
    .nav-brand{display:flex;align-items:center;gap:8px}
    .nav-logo-icon{width:32px;height:32px;background:#3B82F6;border-radius:8px;display:flex;align-items:center;justify-content:center}
    .nav-logo-icon svg{width:18px;height:18px}
    .nav-logo{font-size:16px;font-weight:800;color:#111}
    .nav-close{width:36px;height:36px;border:1px solid #E5E7EB;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#666;background:#fff}
    .nav-close:hover{background:#F5F5F5}

    /* MAIN */
    main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}

    /* ILLUSTRATION */
    .illustration{background:#fff;border:1px solid #E5E7EB;border-radius:20px;padding:24px;margin-bottom:48px;width:560px;max-width:100%;height:200px;display:flex;align-items:center;justify-content:center;gap:24px;position:relative;overflow:hidden}
    .illus-photo{width:72px;height:72px;background:linear-gradient(135deg,#2D4A3E,#1A3528);border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px}
    .illus-frames{display:flex;gap:12px;align-items:flex-end}
    .illus-frame{background:#F5F5F5;border:2px solid #E5E7EB;border-radius:4px}
    .illus-frame.active{border-color:#3B82F6;border-top-color:#3B82F6}
    .illus-frame-a{width:56px;height:90px}
    .illus-frame-b{width:40px;height:56px}
    .illus-frame-c{width:32px;height:44px}
    .illus-dots{position:absolute;inset:0;background-image:radial-gradient(circle,#E5E7EB 1px,transparent 1px);background-size:20px 20px;opacity:0.6;pointer-events:none}
    .illus-inner{position:relative;z-index:1;display:flex;align-items:center;gap:24px;width:100%;justify-content:center}

    /* TEXT */
    main h1{font-size:28px;font-weight:800;margin-bottom:12px;line-height:1.3;letter-spacing:-0.01em}
    main p{font-size:15px;color:#666;line-height:1.6;margin-bottom:40px;max-width:480px}

    /* PROGRESS */
    .progress-wrap{width:560px;max-width:100%;margin-bottom:12px}
    .progress-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .progress-label span{font-size:14px;font-weight:600;color:#111}
    .progress-label .pct{font-size:14px;font-weight:700;color:#3B82F6}
    .progress-track{width:100%;height:6px;background:#F0F0F0;border-radius:3px;overflow:hidden}
    .progress-bar{height:100%;background:#3B82F6;border-radius:3px;transition:width 0.4s ease;width:0%}
    .progress-note{font-size:13px;color:#AAA;margin-top:8px}

    /* BTNS */
    .action-btns{display:flex;flex-direction:column;gap:12px;width:560px;max-width:100%;margin-top:40px}
    .btn-notify{background:#020202;color:#fff;border:none;padding:18px;border-radius:9999px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s}
    .btn-notify:hover{background:#1a1a1a}
    .btn-wait{background:#fff;color:#111;border:2px solid #E5E7EB;padding:18px;border-radius:9999px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:border-color 0.15s}
    .btn-wait:hover{border-color:#3B82F6;color:#3B82F6}

    /* ENGINE TAG */
    .engine-tag{margin-top:48px;font-size:11px;font-weight:700;color:#CCC;letter-spacing:0.15em}

    /* STATUS */
    .status-note{font-size:13px;color:#AAA;margin-top:8px;min-height:20px}

    /* GEAR */
    .gear-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;background:#fff;border:1px solid #E5E7EB;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:200;transition:transform 0.2s}
    .gear-btn:hover{transform:rotate(45deg)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:32px;width:400px;max-width:90vw}
    .modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
    .modal p{font-size:13px;color:#666;margin-bottom:20px}
    .modal input{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;margin-bottom:16px}
    .modal input:focus{border-color:#3B82F6}
    .modal-btns{display:flex;gap:8px}
    .modal-save{flex:1;background:#020202;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .modal-cancel{flex:1;background:#F5F5F5;color:#444;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

    @media(max-width:600px){
      nav{padding:0 20px}
      main h1{font-size:22px}
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-brand">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 18 18" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
        <rect x="1" y="1" width="5" height="16" rx="1"/>
        <rect x="8" y="1" width="5" height="16" rx="1"/>
        <rect x="15" y="1" width="2" height="16" rx="1"/>
      </svg>
    </div>
    <span class="nav-logo">makeyourplace</span>
  </div>
  <div class="nav-close" onclick="window.location.href='step1.html'">✕</div>
</nav>

<main>
  <div class="illustration">
    <div class="illus-dots"></div>
    <div class="illus-inner">
      <div class="illus-photo">🌴</div>
      <div class="illus-frames">
        <div class="illus-frame illus-frame-a active"></div>
        <div class="illus-frame illus-frame-b"></div>
        <div class="illus-frame illus-frame-c"></div>
      </div>
    </div>
  </div>

  <h1>AI가 당신의 브랜드에 딱 맞는<br>팝업스토어를 설계하고 있습니다...</h1>
  <p>공간 면적과 무드 데이터를 바탕으로 최적의 프레임 배치를 계산 중입니다. 잠시만 기다려 주세요.</p>

  <div class="progress-wrap">
    <div class="progress-label">
      <span>공간 분석 및 가구 배치 최적화</span>
      <span class="pct" id="pctLabel">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-note" id="statusNote">데이터를 분석하고 있습니다...</div>
  </div>

  <div class="status-note" id="errorNote"></div>

  <div class="action-btns">
    <button class="btn-notify" onclick="window.location.href='step3-frames.html'">결과 보러 가기</button>
    <button class="btn-wait" onclick="forceComplete()">그냥 기다릴게요</button>
  </div>

  <div class="engine-tag">SPATIAL DESIGN AI ENGINE V2.0</div>
</main>

<button class="gear-btn" onclick="openModal()">⚙</button>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3>API 키 설정</h3>
    <p>Claude API 키를 입력하면 AI 기능이 활성화됩니다.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="document.getElementById('modalOverlay').classList.remove('open')">취소</button>
      <button class="modal-save" onclick="saveApiKey()">저장</button>
    </div>
  </div>
</div>

<script>
const STEPS = [
  '공간 데이터를 분석하고 있습니다...',
  '브랜드 무드와 업종을 해석 중입니다...',
  '최적의 2D 도면 레이아웃을 생성하고 있습니다...',
  '가구 배치 및 동선을 시뮬레이션하고 있습니다.',
  '최종 레이아웃을 정리하고 있습니다...',
];

let progress = 0;
let stepIdx = 0;
let timer;
let aiDone = false;

function setProgress(p, note) {
  progress = Math.min(p, 99);
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('pctLabel').textContent = Math.round(progress) + '%';
  if (note) document.getElementById('statusNote').textContent = note;
}

function animateProgress() {
  timer = setInterval(() => {
    if (aiDone) {
      clearInterval(timer);
      setProgress(100, '분석 완료!');
      document.getElementById('pctLabel').textContent = '100%';
      setTimeout(() => { window.location.href = 'step3-frames.html'; }, 800);
      return;
    }
    progress += Math.random() * 3;
    if (progress > 92) progress = 92;
    if (stepIdx < STEPS.length - 1 && progress > (stepIdx + 1) * 18) stepIdx++;
    setProgress(progress, STEPS[stepIdx]);
  }, 200);
}

async function callClaude() {
  const API_KEY = localStorage.getItem('myp_solution_api_key') || localStorage.getItem('apiKey') || '';
  const step1 = JSON.parse(localStorage.getItem('step1Data') || '{}');

  const prompt = `당신은 팝업스토어 공간 디자이너입니다. 아래 공간 정보를 바탕으로 최적의 팝업스토어 레이아웃을 설계해주세요.

공간정보: ${step1.spaceWidth || 8}m x ${step1.spaceDepth || 6}m, 업종: ${step1.industry || '미입력'}, 브랜드: ${step1.brandName || '미입력'}, 예산: ${step1.budget || '미입력'}, 팝업기간: ${step1.startDate || '미입력'}~${step1.endDate || '미입력'}

아래 JSON 형식으로만 응답해주세요:
{
  "layout": {
    "width": 공간너비(숫자),
    "depth": 공간깊이(숫자)
  },
  "frames": [
    {
      "id": "f1",
      "type": "rack",
      "label": "한국어 라벨",
      "x": 10,
      "y": 10,
      "width": 20,
      "height": 25,
      "color": "#DBEAFE",
      "modules": [{"name": "선반", "quantity": 3, "unitPrice": 15000}]
    }
  ],
  "designConcept": "한국어 2-3문장 디자인 설명"
}

type은 rack, shelf, counter, display, hanger 중 하나. x,y,width,height는 캔버스 대비 퍼센트(0-100). 프레임 2-5개 생성. 프레임이 겹치지 않게 배치. 모듈은 실제 가구/집기 단위로.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 2048,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!response.ok) throw new Error('API 오류');
    const data = await response.json();
    let text = (data.content?.[0]?.text || '').trim();
    const m = text.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('JSON 파싱 실패');
    const layoutData = JSON.parse(m[0]);
    if (!layoutData.frames || !layoutData.frames.length) throw new Error('프레임 없음');
    localStorage.setItem('layoutData', JSON.stringify(layoutData));
  } catch (e) {
    console.error(e);
    const step1 = JSON.parse(localStorage.getItem('step1Data') || '{}');
    localStorage.setItem('layoutData', JSON.stringify(getDefaultLayout(step1)));
  }
  aiDone = true;
}

function getDefaultLayout(step1) {
  const w = parseFloat(step1.spaceWidth) || 8;
  const d = parseFloat(step1.spaceDepth) || 6;
  return {
    layout: { width: w, depth: d },
    frames: [
      { id: 'f1', type: 'rack', label: '메인 진열대', x: 5, y: 5, width: 22, height: 28, color: '#DBEAFE',
        modules: [{ name: '선반', quantity: 3, unitPrice: 15000 }, { name: '행거봉', quantity: 1, unitPrice: 20000 }] },
      { id: 'f2', type: 'counter', label: '카운터', x: 70, y: 5, width: 22, height: 18, color: '#FEF3C7',
        modules: [{ name: '카운터 유닛', quantity: 1, unitPrice: 50000 }] },
      { id: 'f3', type: 'display', label: '디스플레이 존', x: 5, y: 60, width: 35, height: 28, color: '#DCFCE7',
        modules: [{ name: '진열 선반', quantity: 4, unitPrice: 12000 }] },
      { id: 'f4', type: 'hanger', label: '행거 존', x: 55, y: 45, width: 18, height: 35, color: '#EDE9FE',
        modules: [{ name: '의류 행거', quantity: 2, unitPrice: 25000 }] },
    ],
    designConcept: `${step1.brandName || '브랜드'}의 팝업스토어를 위한 기본 레이아웃입니다. 입구에서 자연스럽게 시선이 이동하는 동선을 고려하여 진열대와 카운터를 배치했습니다. 방문객이 공간 전체를 탐색하며 제품을 체험할 수 있도록 설계되었습니다.`
  };
}

function forceComplete() {
  aiDone = true;
}

// Start
animateProgress();
callClaude();

function openModal(){
  document.getElementById('apiKeyInput').value = localStorage.getItem('myp_solution_api_key') || localStorage.getItem('apiKey')||'';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){
  if(e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
function saveApiKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(k){ localStorage.setItem('myp_solution_api_key',k); localStorage.setItem('apiKey',k); }
  document.getElementById('modalOverlay').classList.remove('open');
}
</script>
</body>
</html>
