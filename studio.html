<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MYP Studio</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --panel: #161b22;
  --border: #30363d;
  --hover: #1f2937;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --text: #e6edf3;
  --text-2: #8b949e;
  --text-3: #484f58;
  --input-bg: #0d1117;
  --user-msg: #1d3557;
  --ai-msg: #161b22;
  --r: 8px;
  --r-sm: 6px;
}

html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; overflow: hidden; background: var(--bg); color: var(--text); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── LOGIN ── */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.login-box {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 40px 48px; width: 340px; text-align: center;
}
.login-logo { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.login-logo span { color: var(--accent); }
.login-sub { color: var(--text-2); font-size: 13px; margin-bottom: 28px; }
.login-input {
  width: 100%; padding: 10px 14px; border-radius: var(--r-sm);
  background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); font-size: 15px; text-align: center;
  letter-spacing: 4px; outline: none; margin-bottom: 12px;
}
.login-input:focus { border-color: var(--accent); }
.login-btn {
  width: 100%; padding: 10px; border-radius: var(--r-sm);
  background: var(--accent); border: none; color: #fff;
  font-size: 14px; font-weight: 600; cursor: pointer;
}
.login-btn:hover { background: var(--accent-hover); }
.login-err { color: #f85149; font-size: 12px; margin-top: 8px; min-height: 16px; }

/* ── MAIN LAYOUT ── */
#app { display: none; height: 100vh; }
#app.visible { display: flex; }

/* ── LEFT PANEL ── */
#left {
  width: 360px; flex-shrink: 0;
  background: var(--panel); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

#left-header {
  flex-shrink: 0; padding: 14px 16px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-size: 15px; font-weight: 700; }
.logo span { color: var(--accent); }
.header-actions { display: flex; gap: 6px; }
.icon-btn {
  width: 30px; height: 30px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text-2); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all .15s;
}
.icon-btn:hover { background: var(--hover); color: var(--text); }

/* File selector */
#file-row {
  flex-shrink: 0; padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
#file-select {
  flex: 1; padding: 7px 10px; border-radius: var(--r-sm);
  background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; outline: none; cursor: pointer;
}
#file-select:focus { border-color: var(--accent); }
#load-btn {
  padding: 7px 12px; border-radius: var(--r-sm);
  background: var(--hover); border: 1px solid var(--border);
  color: var(--text-2); font-size: 12px; cursor: pointer; white-space: nowrap;
}
#load-btn:hover { color: var(--text); }

/* Chat history */
#chat {
  flex: 1; overflow-y: auto; padding: 12px;
  display: flex; flex-direction: column; gap: 10px;
}

.msg { display: flex; flex-direction: column; max-width: 100%; }
.msg.user { align-items: flex-end; }
.msg.ai { align-items: flex-start; }
.msg-bubble {
  padding: 10px 13px; border-radius: var(--r);
  font-size: 13px; line-height: 1.6; max-width: 90%; word-break: break-word;
}
.msg.user .msg-bubble { background: var(--user-msg); color: var(--text); border-radius: var(--r) var(--r-sm) var(--r) var(--r); }
.msg.ai .msg-bubble { background: var(--ai-msg); border: 1px solid var(--border); color: var(--text); border-radius: var(--r-sm) var(--r) var(--r) var(--r); }
.msg-thumb-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
.msg-thumb { width: 52px; height: 52px; object-fit: cover; border-radius: var(--r-sm); border: 1px solid var(--border); }
.msg-status { font-size: 11px; color: var(--text-3); margin-top: 4px; padding: 0 2px; }

/* Thinking indicator */
.thinking { display: flex; gap: 5px; padding: 10px 13px; background: var(--ai-msg); border: 1px solid var(--border); border-radius: var(--r-sm) var(--r) var(--r) var(--r); }
.thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); animation: pulse 1.2s infinite; }
.thinking span:nth-child(2) { animation-delay: .2s; }
.thinking span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,60%,100% { opacity: .3; transform: scale(.8); } 30% { opacity: 1; transform: scale(1); } }

/* Input area */
#input-area {
  flex-shrink: 0; padding: 10px 12px 12px;
  border-top: 1px solid var(--border);
}
#image-previews { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.img-prev-wrap { position: relative; }
.img-prev { width: 52px; height: 52px; object-fit: cover; border-radius: var(--r-sm); border: 1px solid var(--border); display: block; }
.img-prev-rm {
  position: absolute; top: -5px; right: -5px; width: 16px; height: 16px;
  border-radius: 50%; background: #f85149; border: none; color: #fff;
  font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  line-height: 1;
}
#prompt-box {
  width: 100%; min-height: 72px; max-height: 160px; resize: vertical;
  padding: 10px 12px; border-radius: var(--r-sm);
  background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; line-height: 1.6;
  outline: none; font-family: inherit; margin-bottom: 8px;
}
#prompt-box:focus { border-color: var(--accent); }
#prompt-box::placeholder { color: var(--text-3); }
#input-actions { display: flex; align-items: center; justify-content: space-between; }
#input-left { display: flex; gap: 6px; align-items: center; }
.attach-btn {
  padding: 6px 10px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); font-size: 13px; cursor: pointer;
}
.attach-btn:hover { color: var(--text); background: var(--hover); }
#img-count { font-size: 11px; color: var(--text-3); }
#send-btn {
  padding: 7px 16px; border-radius: var(--r-sm);
  background: var(--accent); border: none; color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
#send-btn:hover:not(:disabled) { background: var(--accent-hover); }
#send-btn:disabled { opacity: .5; cursor: not-allowed; }

/* ── RIGHT PANEL ── */
#right { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

#right-header {
  flex-shrink: 0; padding: 0 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  height: 45px; background: var(--panel);
}
.tab-group { display: flex; gap: 0; }
.tab-btn {
  padding: 0 16px; height: 45px; border: none; background: transparent;
  color: var(--text-2); font-size: 13px; cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text); }
.right-actions { display: flex; gap: 6px; }
.save-btn {
  padding: 5px 12px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); font-size: 12px; cursor: pointer;
}
.save-btn:hover { color: var(--text); background: var(--hover); }

#preview-pane { flex: 1; display: flex; overflow: hidden; }
#preview-pane iframe { flex: 1; border: none; background: #fff; }
#code-pane {
  flex: 1; display: none; overflow: auto; padding: 20px;
}
#code-pane pre {
  margin: 0; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px;
  line-height: 1.7; color: var(--text); white-space: pre-wrap; word-break: break-all;
}

/* ── SETTINGS MODAL ── */
#modal-backdrop {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 500; align-items: center; justify-content: center;
}
#modal-backdrop.open { display: flex; }
.modal {
  background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px 32px; width: 420px;
}
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; color: var(--text-2); margin-bottom: 6px; }
.field input, .field select {
  width: 100%; padding: 9px 12px; border-radius: var(--r-sm);
  background: var(--input-bg); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; outline: none;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
.btn-cancel {
  padding: 8px 16px; border-radius: var(--r-sm);
  background: transparent; border: 1px solid var(--border);
  color: var(--text-2); font-size: 13px; cursor: pointer;
}
.btn-save {
  padding: 8px 16px; border-radius: var(--r-sm);
  background: var(--accent); border: none; color: #fff;
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.btn-save:hover { background: var(--accent-hover); }

/* Toast */
#toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1f2937; border: 1px solid var(--border); color: var(--text);
  padding: 10px 20px; border-radius: var(--r); font-size: 13px;
  z-index: 9999; opacity: 0; transition: opacity .25s; pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">MYP <span>Studio</span></div>
    <div class="login-sub">접근 코드를 입력하세요</div>
    <input type="password" id="code-input" class="login-input" placeholder="••••••••" maxlength="16" />
    <button class="login-btn" onclick="tryLogin()">입력</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- LEFT -->
  <div id="left">
    <div id="left-header">
      <div class="logo">MYP <span>Studio</span></div>
      <div class="header-actions">
        <button class="icon-btn" onclick="openSettings()" title="설정">⚙️</button>
      </div>
    </div>

    <div id="file-row">
      <select id="file-select">
        <optgroup label="🗂 메이크유어플레이스 솔루션">
          <option value="index.html">index.html</option>
          <option value="step1.html">step1.html</option>
          <option value="step2-loading.html">step2-loading.html</option>
          <option value="step2.html">step2.html</option>
          <option value="step3-frames.html">step3-frames.html</option>
          <option value="step3.html">step3.html</option>
          <option value="step4.html">step4.html</option>
          <option value="step5.html">step5.html</option>
          <option value="complete.html">complete.html</option>
          <option value="studio.html">studio.html</option>
        </optgroup>
      </select>
      <button id="load-btn" onclick="loadFile()">불러오기</button>
    </div>

    <div id="chat"></div>

    <div id="input-area">
      <div id="image-previews"></div>
      <textarea id="prompt-box" placeholder="수정 지시사항을 입력하세요... (Ctrl+Enter 전송)"></textarea>
      <div id="input-actions">
        <div id="input-left">
          <button class="attach-btn" onclick="document.getElementById('img-input').click()">📎 이미지</button>
          <span id="img-count"></span>
          <input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="addImages(this.files)" />
        </div>
        <button id="send-btn" onclick="sendMessage()">▶ 생성</button>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div id="right-header">
      <div class="tab-group">
        <button class="tab-btn active" id="tab-preview" onclick="switchTab('preview')">미리보기</button>
        <button class="tab-btn" id="tab-code" onclick="switchTab('code')">코드</button>
      </div>
      <div class="right-actions">
        <button class="save-btn" onclick="saveToGitHub()">💾 저장</button>
      </div>
    </div>
    <div id="preview-pane">
      <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
    <div id="code-pane">
      <pre id="code-display"></pre>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="modal-backdrop">
  <div class="modal">
    <div class="modal-title">⚙️ 설정</div>
    <div class="field">
      <label>Anthropic API 키</label>
      <input type="password" id="s-apikey" placeholder="sk-ant-..." />
    </div>
    <div class="field">
      <label>GitHub 토큰</label>
      <input type="password" id="s-ghtoken" placeholder="ghp_..." />
    </div>
    <div class="field">
      <label>모델</label>
      <select id="s-model">
        <option value="claude-opus-4-5">claude-opus-4-5</option>
        <option value="claude-sonnet-4-5" selected>claude-sonnet-4-5</option>
        <option value="claude-haiku-4-5">claude-haiku-4-5</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">취소</button>
      <button class="btn-save" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONFIG ──
const ACCESS_CODE = 'MYP1101';
const REPO = 'kman-cmyk/popup-designer';
const GITHUB_API = 'https://api.github.com';
const ANTHROPIC_API = 'https://api.anthropic.com/v1/messages';

// ── STATE ──
let currentCode = '';
let attachedImages = []; // [{base64, mediaType, name}]
let isGenerating = false;
let currentFileSHA = null;

// ── SETTINGS ──
function getSettings() {
  return {
    apiKey: localStorage.getItem('myp_apikey') || '',
    ghToken: localStorage.getItem('myp_ghtoken') || '',
    model: localStorage.getItem('myp_model') || 'claude-sonnet-4-5',
  };
}
function openSettings() {
  const s = getSettings();
  document.getElementById('s-apikey').value = s.apiKey;
  document.getElementById('s-ghtoken').value = s.ghToken;
  document.getElementById('s-model').value = s.model;
  document.getElementById('modal-backdrop').classList.add('open');
}
function closeSettings() { document.getElementById('modal-backdrop').classList.remove('open'); }
function saveSettings() {
  localStorage.setItem('myp_apikey', document.getElementById('s-apikey').value.trim());
  localStorage.setItem('myp_ghtoken', document.getElementById('s-ghtoken').value.trim());
  localStorage.setItem('myp_model', document.getElementById('s-model').value);
  closeSettings();
  showToast('설정이 저장됐습니다');
}

// ── LOGIN ──
function tryLogin() {
  const val = document.getElementById('code-input').value;
  if (val === ACCESS_CODE) {
    sessionStorage.setItem('myp_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    addSystemMsg('안녕하세요! 파일을 선택하고 수정 지시사항을 입력하세요.');
  } else {
    document.getElementById('login-err').textContent = '접근 코드가 올바르지 않습니다';
  }
}
document.getElementById('code-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

if (sessionStorage.getItem('myp_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  setTimeout(() => addSystemMsg('안녕하세요! 파일을 선택하고 수정 지시사항을 입력하세요.'), 100);
}

// ── TABS ──
function switchTab(tab) {
  document.getElementById('tab-preview').classList.toggle('active', tab === 'preview');
  document.getElementById('tab-code').classList.toggle('active', tab === 'code');
  document.getElementById('preview-pane').style.display = tab === 'preview' ? 'flex' : 'none';
  document.getElementById('code-pane').style.display = tab === 'code' ? 'block' : 'none';
}

// ── FILE LOADING ──
async function loadFile() {
  const filename = document.getElementById('file-select').value;
  const { ghToken } = getSettings();
  const btn = document.getElementById('load-btn');
  btn.textContent = '로딩...';
  btn.disabled = true;
  try {
    const headers = { 'Accept': 'application/vnd.github.v3+json' };
    if (ghToken) headers['Authorization'] = `token ${ghToken}`;
    const res = await fetch(`${GITHUB_API}/repos/${REPO}/contents/${filename}`, { headers });
    if (!res.ok) throw new Error(`GitHub ${res.status}`);
    const data = await res.json();
    const content = atob(data.content.replace(/\n/g, ''));
    currentFileSHA = data.sha;
    setCode(content);
    addSystemMsg(`✅ ${filename} 불러왔습니다`);
  } catch (e) {
    showToast(`파일 로드 실패: ${e.message}`);
  } finally {
    btn.textContent = '불러오기';
    btn.disabled = false;
  }
}

function setCode(html) {
  currentCode = html;
  const iframe = document.getElementById('preview-iframe');
  const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
  const blobUrl = URL.createObjectURL(blob);
  if (iframe._blobUrl) URL.revokeObjectURL(iframe._blobUrl);
  iframe._blobUrl = blobUrl;
  iframe.src = blobUrl;
  document.getElementById('code-display').textContent = html;
}

// ── CHAT ──
function addSystemMsg(text) {
  addMsg('ai', text);
}

function addMsg(role, text, images) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (images && images.length > 0) {
    const row = document.createElement('div');
    row.className = 'msg-thumb-row';
    images.forEach(img => {
      const el = document.createElement('img');
      el.className = 'msg-thumb';
      el.src = `data:${img.mediaType};base64,${img.base64}`;
      row.appendChild(el);
    });
    div.appendChild(row);
  }

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addThinking() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

// ── IMAGE ATTACH ──
function addImages(files) {
  const remaining = 5 - attachedImages.length;
  const toAdd = Array.from(files).slice(0, remaining);
  toAdd.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const b64 = e.target.result.split(',')[1];
      attachedImages.push({ base64: b64, mediaType: file.type, name: file.name });
      renderImagePreviews();
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('img-input').value = '';
}

function removeImage(idx) {
  attachedImages.splice(idx, 1);
  renderImagePreviews();
}

function renderImagePreviews() {
  const container = document.getElementById('image-previews');
  container.innerHTML = '';
  attachedImages.forEach((img, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'img-prev-wrap';
    wrap.innerHTML = `
      <img class="img-prev" src="data:${img.mediaType};base64,${img.base64}" />
      <button class="img-prev-rm" onclick="removeImage(${i})">×</button>
    `;
    container.appendChild(wrap);
  });
  document.getElementById('img-count').textContent = attachedImages.length > 0 ? `${attachedImages.length}/5` : '';
}

// Drop on textarea
const promptBox = document.getElementById('prompt-box');
promptBox.addEventListener('dragover', e => e.preventDefault());
promptBox.addEventListener('drop', e => {
  e.preventDefault();
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) addImages(files);
});
promptBox.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); }
});

// ── SEND ──
async function sendMessage() {
  if (isGenerating) return;
  const { apiKey, model } = getSettings();
  if (!apiKey) { openSettings(); showToast('API 키를 먼저 설정해주세요'); return; }

  const text = promptBox.value.trim();
  if (!text && attachedImages.length === 0) return;

  const userText = text || '(이미지 첨부)';
  const sentImages = [...attachedImages];
  addMsg('user', userText, sentImages);

  promptBox.value = '';
  attachedImages = [];
  renderImagePreviews();

  isGenerating = true;
  document.getElementById('send-btn').disabled = true;

  const thinking = addThinking();

  try {
    const html = await callAI(apiKey, model, text, sentImages);
    thinking.remove();

    if (html) {
      const filename = document.getElementById('file-select').value;
      setCode(html);
      addMsg('ai', `✅ ${filename} 업데이트됐습니다. 코드가 적용됐어요.`);
      autoSave();
    } else {
      addMsg('ai', '코드를 생성하지 못했습니다. 다시 시도해주세요.');
    }
  } catch (e) {
    thinking.remove();
    addMsg('ai', `오류: ${e.message}`);
  } finally {
    isGenerating = false;
    document.getElementById('send-btn').disabled = false;
  }
}

// ── AI CALL ──
async function callAI(apiKey, model, text, images) {
  const filename = document.getElementById('file-select').value;
  const systemPrompt = `You are a web developer editing "${filename}".
Return ONLY complete HTML code, nothing else.
No JSON. No markdown fences. No explanation. No comments outside HTML.
Start your response directly with <!DOCTYPE html> or <html.
The user may send images for reference.`;

  // Build user content
  const userContent = [];
  if (images.length > 0) {
    images.forEach(img => {
      userContent.push({ type: 'image', source: { type: 'base64', media_type: img.mediaType, data: img.base64 } });
    });
  }

  let userText = text || 'Update this file as shown in the image.';
  if (currentCode) {
    userText += `\n\nCurrent file content:\n\`\`\`html\n${currentCode}\n\`\`\``;
  }
  userContent.push({ type: 'text', text: userText });

  const body = {
    model,
    max_tokens: 8192,
    system: systemPrompt,
    messages: [{ role: 'user', content: userContent }],
  };

  const res = await fetch(ANTHROPIC_API, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify(body),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API ${res.status}`);
  }

  const data = await res.json();
  const raw = data.content?.[0]?.text || '';
  return extractHTML(raw);
}

// ── HTML EXTRACTION ──
function extractHTML(raw) {
  if (!raw) return null;

  // Try markdown code block first
  const fenceMatch = raw.match(/```(?:html)?\s*([\s\S]*?)```/i);
  if (fenceMatch) {
    const candidate = fenceMatch[1].trim();
    if (looksLikeHTML(candidate)) return candidate;
  }

  // Try finding DOCTYPE or <html start
  const doctypeIdx = raw.search(/<!DOCTYPE\s+html/i);
  if (doctypeIdx !== -1) return raw.slice(doctypeIdx).trim();

  const htmlIdx = raw.search(/<html[\s>]/i);
  if (htmlIdx !== -1) return raw.slice(htmlIdx).trim();

  // If it starts with < it's probably HTML
  const trimmed = raw.trim();
  if (trimmed.startsWith('<')) return trimmed;

  return null;
}

function looksLikeHTML(str) {
  return /<!DOCTYPE\s+html/i.test(str) || /<html[\s>]/i.test(str) || /<head[\s>]/i.test(str);
}

// ── GITHUB SAVE ──
async function saveToGitHub() {
  const { ghToken } = getSettings();
  if (!ghToken) { openSettings(); showToast('GitHub 토큰을 먼저 설정해주세요'); return; }
  if (!currentCode) { showToast('저장할 코드가 없습니다'); return; }

  const filename = document.getElementById('file-select').value;
  await commitToGitHub(filename, ghToken);
}

async function autoSave() {
  const { ghToken } = getSettings();
  if (!ghToken || !currentCode) return;
  const filename = document.getElementById('file-select').value;
  await commitToGitHub(filename, ghToken, true);
}

async function commitToGitHub(filename, token, silent = false) {
  try {
    const content = btoa(unescape(encodeURIComponent(currentCode)));
    const body = {
      message: `Update: ${filename} via MYP Studio`,
      content,
    };
    if (currentFileSHA) body.sha = currentFileSHA;

    const res = await fetch(`${GITHUB_API}/repos/${REPO}/contents/${filename}`, {
      method: 'PUT',
      headers: {
        'Authorization': `token ${token}`,
        'Content-Type': 'application/json',
        'Accept': 'application/vnd.github.v3+json',
      },
      body: JSON.stringify(body),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || `GitHub ${res.status}`);
    }

    const data = await res.json();
    currentFileSHA = data.content?.sha || currentFileSHA;
    if (!silent) showDeployPopup(filename);
  } catch (e) {
    if (!silent) showToast(`저장 실패: ${e.message}`);
    else console.warn('Auto-save failed:', e.message);
  }
}

function showDeployPopup(filename) {
  const url = `https://kman-cmyk.github.io/popup-designer/${filename}`;
  const existing = document.getElementById('deploy-popup');
  if (existing) existing.remove();
  const popup = document.createElement('div');
  popup.id = 'deploy-popup';
  popup.style.cssText = `
    position:fixed; bottom:60px; right:20px; z-index:9999;
    background:#161b22; border:1px solid #30363d; border-radius:12px;
    padding:16px 20px; min-width:320px; box-shadow:0 8px 32px rgba(0,0,0,0.5);
    font-family:sans-serif;
  `;
  popup.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="color:#3fb950;font-weight:600;font-size:14px">✅ 저장 완료!</span>
      <button onclick="this.closest('#deploy-popup').remove()" style="background:none;border:none;color:#8b949e;cursor:pointer;font-size:16px">✕</button>
    </div>
    <div style="background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
      <span style="color:#8b949e;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${url}</span>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="navigator.clipboard.writeText('${url}').then(()=>{this.textContent='✅ 복사됨!';setTimeout(()=>this.textContent='🔗 링크 복사',1500)})"
        style="flex:1;padding:8px;background:#1f6feb;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:13px;font-weight:600">🔗 링크 복사</button>
      <button onclick="window.open('${url}','_blank')"
        style="padding:8px 14px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#cdd9e5;cursor:pointer;font-size:13px">열기</button>
    </div>
  `;
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 10000);
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── MODAL CLOSE ON BACKDROP CLICK ──
document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeSettings();
});
