<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEP 2. 스타일 선택 — makeyourplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Pretendard',sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;flex-direction:column}

    /* NAV */
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:60px;border-bottom:1px solid #F0F0F0}
    .nav-logo{font-size:16px;font-weight:800;color:#111;text-decoration:none}
    .nav-links{display:flex;gap:28px;list-style:none}
    .nav-links a{font-size:14px;color:#555;text-decoration:none;font-weight:500}
    .nav-step{background:#3B82F6;color:#fff;padding:6px 14px;border-radius:9999px;font-size:12px;font-weight:700;letter-spacing:0.04em}

    /* MAIN */
    main{flex:1;padding:60px 48px 40px;max-width:1200px;margin:0 auto;width:100%}
    .page-header{text-align:center;margin-bottom:12px}
    .page-header h1{font-size:32px;font-weight:800;margin-bottom:8px;letter-spacing:-0.01em}
    .page-header p{font-size:15px;color:#666}

    /* INFO BAR */
    .info-bar{background:#EFF6FF;border:1px solid #DBEAFE;border-radius:9999px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-size:13px;color:#3B82F6;font-weight:500;margin:24px auto 40px;max-width:640px}
    .info-bar-icon{font-size:16px}

    /* CARDS */
    .concepts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:48px}
    .concept-card{border:1px solid #E5E7EB;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow 0.2s,border-color 0.2s;cursor:pointer}
    .concept-card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.1);border-color:#3B82F6}
    .concept-card.selected{border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,0.2)}
    .card-image{height:220px;display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;overflow:hidden}
    .card-image-1{background:linear-gradient(135deg,#F5F0E8,#EDE8DF)}
    .card-image-2{background:linear-gradient(135deg,#F0EDE8,#E8E0D5)}
    .card-image-3{background:linear-gradient(135deg,#E8ECEE,#D8DDE0)}
    .card-image-text{font-size:13px;color:rgba(100,80,60,0.5);font-style:italic;position:absolute;bottom:16px;left:0;right:0;text-align:center;font-weight:600;letter-spacing:0.05em}
    .card-body{padding:20px;flex:1;display:flex;flex-direction:column}
    .card-label{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;display:flex;align-items:center;gap:8px}
    .card-badge{background:#EF4444;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:9999px;letter-spacing:0.04em}
    .card-name{font-size:20px;font-weight:800;margin-bottom:10px;letter-spacing:-0.01em}
    .card-desc{font-size:13px;color:#666;line-height:1.7;flex:1;margin-bottom:20px}
    .card-select-btn{width:100%;background:#3B82F6;color:#fff;border:none;padding:14px;border-radius:9999px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.15s;margin-top:auto}
    .card-select-btn:hover{background:#2563EB}
    .concept-card.selected .card-select-btn{background:#1D4ED8}

    /* SKELETON */
    .skeleton{animation:shimmer 1.5s infinite linear;background:linear-gradient(90deg,#F0F0F0 25%,#E0E0E0 50%,#F0F0F0 75%);background-size:200% 100%}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skeleton-text{height:14px;border-radius:4px;margin-bottom:8px}
    .skeleton-title{height:24px;border-radius:4px;margin-bottom:12px;width:70%}

    /* FOOTER BAR */
    .footer-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-top:1px solid #F0F0F0;max-width:1200px;margin:0 auto;width:100%;padding-left:48px;padding-right:48px}
    .btn-back{display:flex;align-items:center;gap:6px;font-size:14px;color:#666;cursor:pointer;font-weight:500;background:none;border:none;font-family:inherit}
    .btn-back:hover{color:#111}
    .pagination-dots{display:flex;gap:6px;align-items:center}
    .dot{width:8px;height:8px;border-radius:9999px;background:#E5E7EB}
    .dot.active{background:#3B82F6;width:20px;border-radius:9999px}

    /* GEAR */
    .gear-btn{position:fixed;bottom:24px;right:24px;width:44px;height:44px;background:#fff;border:1px solid #E5E7EB;border-radius:9999px;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,0.1);z-index:200;transition:transform 0.2s}
    .gear-btn:hover{transform:rotate(45deg)}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:32px;width:400px;max-width:90vw}
    .modal h3{font-size:18px;font-weight:700;margin-bottom:8px}
    .modal p{font-size:13px;color:#666;margin-bottom:20px}
    .modal input{width:100%;border:1px solid #E5E7EB;border-radius:9999px;padding:12px 14px;font-size:14px;font-family:inherit;outline:none;margin-bottom:16px}
    .modal input:focus{border-color:#3B82F6}
    .modal-btns{display:flex;gap:8px}
    .modal-save{flex:1;background:#3B82F6;color:#fff;border:none;padding:12px;border-radius:9999px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .modal-cancel{flex:1;background:#F5F5F5;color:#444;border:none;padding:12px;border-radius:9999px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

    footer{padding:20px 48px;border-top:1px solid #F0F0F0;font-size:12px;color:#CCC;display:flex;justify-content:space-between}
    footer a{color:#CCC;text-decoration:none}

    @media(max-width:900px){
      .concepts-grid{grid-template-columns:1fr 1fr}
      nav{padding:0 20px}
      main{padding:40px 20px 32px}
      .footer-bar{padding-left:20px;padding-right:20px}
      footer{padding:16px 20px}
    }
    @media(max-width:600px){
      .concepts-grid{grid-template-columns:1fr}
      .nav-links{display:none}
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">makeyourplace</a>
  <ul class="nav-links">
    <li><a href="#">서비스 소개</a></li>
    <li><a href="#">설계 사례</a></li>
    <li><a href="#">고객지원</a></li>
  </ul>
  <div class="nav-step">STEP 02</div>
</nav>

<main>
  <div class="page-header">
    <h1>AI가 분석한 당신만을 위한 최적의 설계</h1>
    <p>사용자의 취향과 공간의 특성을 반영한 3가지 맞춤형 디자인 컨셉입니다.</p>
  </div>

  <div class="info-bar">
    <span class="info-bar-icon">✦</span>
    <span>공간의 조도를 분석하여 최적의 프레임 배치를 자동으로 추천해 드립니다.</span>
  </div>

  <div class="concepts-grid" id="conceptsGrid">
    <!-- Cards rendered by JS -->
    <div class="concept-card">
      <div class="card-image card-image-1 skeleton" style="height:220px"></div>
      <div class="card-body">
        <div class="skeleton skeleton-text" style="width:40%"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width:80%"></div>
      </div>
    </div>
    <div class="concept-card">
      <div class="card-image card-image-2 skeleton" style="height:220px"></div>
      <div class="card-body">
        <div class="skeleton skeleton-text" style="width:40%"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width:80%"></div>
      </div>
    </div>
    <div class="concept-card">
      <div class="card-image card-image-3 skeleton" style="height:220px"></div>
      <div class="card-body">
        <div class="skeleton skeleton-text" style="width:40%"></div>
        <div class="skeleton skeleton-title"></div>
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text" style="width:80%"></div>
      </div>
    </div>
  </div>
</main>

<div class="footer-bar">
  <button class="btn-back" onclick="window.location.href='step1.html'">‹ 이전 단계로</button>
  <div class="pagination-dots">
    <div class="dot"></div>
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div></div>
</div>

<footer>
  <span>© 2024 makeyourplace AI. All rights reserved.</span>
  <span><a href="#">이용약관</a> &nbsp; <a href="#">개인정보처리방침</a></span>
</footer>

<button class="gear-btn" onclick="openModal()">⚙</button>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3>API 키 설정</h3>
    <p>Claude API 키를 입력하면 AI 기능이 활성화됩니다.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-...">
    <div class="modal-btns">
      <button class="modal-cancel" onclick="document.getElementById('modalOverlay').classList.remove('open')">취소</button>
      <button class="modal-save" onclick="saveApiKey()">저장</button>
    </div>
  </div>
</div>

<script>
const CARD_BG_CLASSES = ['card-image-1', 'card-image-2', 'card-image-3'];

function renderCards(concepts) {
  const grid = document.getElementById('conceptsGrid');
  grid.innerHTML = '';
  concepts.forEach((c, i) => {
    const bg = CARD_BG_CLASSES[i % CARD_BG_CLASSES.length];
    const accentBorder = c.primaryColor ? `border-top: 4px solid ${c.primaryColor}` : '';
    const keywordBadges = (c.keywords || []).map(k =>
      `<span style="display:inline-block;background:#F3F4F6;color:#555;font-size:11px;font-weight:600;padding:3px 8px;border-radius:9999px;margin:2px 2px 2px 0">${k}</span>`
    ).join('');
    const card = document.createElement('div');
    card.className = 'concept-card';
    card.id = `card-${i}`;
    card.style.cssText = accentBorder;
    card.innerHTML = `
      <div class="card-image ${bg}" style="flex-direction:column;gap:8px;${c.primaryColor ? `background:linear-gradient(135deg,${c.primaryColor}22,${c.accentColor || '#F5F5F5'})` : ''}">
        <span style="font-size:15px;font-weight:800;color:${c.primaryColor || '#444'};letter-spacing:0.05em;text-transform:uppercase">${c.mood || ''}</span>
        <span style="font-size:11px;color:#888;font-weight:600">${(c.keywords || []).join(' · ')}</span>
      </div>
      <div class="card-body">
        <div class="card-label">CONCEPT 0${i + 1}</div>
        <div class="card-name">${c.title || c.name || ''}</div>
        <div class="card-desc">${c.description || ''}</div>
        <div style="margin-bottom:16px">${keywordBadges}</div>
        <button class="card-select-btn" onclick="selectConcept(${i}, event)">이 설계 선택하기</button>
      </div>`;
    grid.appendChild(card);
  });
}

function selectConcept(idx, e) {
  const concepts = JSON.parse(localStorage.getItem('step2Concepts') || '[]');
  document.querySelectorAll('.concept-card').forEach(c => c.classList.remove('selected'));
  e.target.closest('.concept-card').classList.add('selected');
  localStorage.setItem('selectedConcept', JSON.stringify(concepts[idx]));
  setTimeout(() => { window.location.href = 'step3-frames.html'; }, 400);
}

window.addEventListener('load', () => {
  const concepts = JSON.parse(localStorage.getItem('step2Concepts') || '[]');
  if (concepts.length) {
    renderCards(concepts);
  } else {
    let tries = 0;
    const poll = setInterval(() => {
      const c = JSON.parse(localStorage.getItem('step2Concepts') || '[]');
      if (c.length || tries++ > 30) {
        clearInterval(poll);
        renderCards(c.length ? c : getDefaultConcepts());
      }
    }, 500);
  }
});

function getDefaultConcepts() {
  return [
    { title: '미니멀 모던', description: '절제된 요소와 무채색의 조화를 통해 공간의 개방감을 극대화합니다. 깔끔한 라인과 레이아웃 배치가 시각적 피로도를 낮춥니다.', keywords: ['미니멀', '깔끔', '현대적'], primaryColor: '#2D2D2D', accentColor: '#F5F5F5', mood: '세련됨' },
    { title: '웜 내추럴', description: '무드 톤과 따뜻한 소재를 사용하여 아늑한 분위기를 연출합니다. 자연적인 흐름을 고려한 곡선 조형의 레이아웃 배치가 특징입니다.', keywords: ['따뜻함', '자연', '편안함'], primaryColor: '#8B6F47', accentColor: '#F5ECD7', mood: '아늑함' },
    { title: '어반 인더스트리얼', description: '거친 질감과 금속 소재를 활용하여 세련된 도시 감각을 구현합니다. 불규칙한 그리드 시스템을 통해 독특한 개성을 표현합니다.', keywords: ['모던', '도시적', '대담함'], primaryColor: '#374151', accentColor: '#9CA3AF', mood: '강렬함' },
  ];
}

function openModal(){
  document.getElementById('apiKeyInput').value = localStorage.getItem('apiKey')||'';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(e){
  if(e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}
function saveApiKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(k) localStorage.setItem('apiKey',k);
  document.getElementById('modalOverlay').classList.remove('open');
}
</script>
</body>
</html>
